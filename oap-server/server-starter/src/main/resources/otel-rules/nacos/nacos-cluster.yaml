# This will parse a textual representation of a duration. The formats
# accepted are based on the ISO-8601 duration format {@code PnDTnHnMn.nS}
# with days considered to be exactly 24 hours.
# <p>
# Examples:
# <pre>
#    "PT20.345S" -- parses as "20.345 seconds"
#    "PT15M"     -- parses as "15 minutes" (where a minute is 60 seconds)
#    "PT10H"     -- parses as "10 hours" (where an hour is 3600 seconds)
#    "P2D"       -- parses as "2 days" (where a day is 24 hours or 86400 seconds)
#    "P2DT3H4M"  -- parses as "2 days, 3 hours and 4 minutes"
#    "P-6H3M"    -- parses as "-6 hours and +3 minutes"
#    "-P6H3M"    -- parses as "-6 hours and -3 minutes"
#    "-P-6H+3M"  -- parses as "+6 hours and -3 minutes"
# </pre>
filter: "{ tags -> tags.job_name == 'nacos-monitoring' }" # The OpenTelemetry job name
expSuffix: tag({tags -> tags.cluster = 'nacos::' + tags.cluster}).service(['cluster'], Layer.NACOS)
metricPrefix: meter_nacos_cluster
metricsRules:

  # naming
  - name: instance_count
    exp: nacos_monitor.tagEqual('name', 'ipCount').sum(['cluster'])
  - name: service_count
    exp: nacos_monitor.tagEqual('name', 'serviceCount').sum(['cluster'])
  - name: failed_push_count
    exp: nacos_monitor.tagEqual('name', 'failedPush').sum(['cluster'])
  - name: success_push
    exp: nacos_monitor.tagEqual('name', 'totalPush').sum(['cluster'])
  - name: max_push_cost
    exp: nacos_monitor.tagEqual('name', 'maxPushCost').sum(['cluster'])
  - name: avg_push_cost
    exp: nacos_monitor.tagEqual('name', 'avgPushCost').sum(['cluster'])
  - name: subscriber_count
    exp: nacos_monitor.tagEqual('name', 'subscriberCount').sum(['cluster'])

  # http request
  - name: http_success_requests_count
    exp: http_server_requests_seconds_count.tagMatch("exception", "none").sum(['cluster','method'])
  - name: http_exception_requests_count
    exp: http_server_requests_seconds_count.tagNotMatch("exception", "none").sum(['cluster','method'])

  # config
  - name: config_count
    exp: nacos_monitor.tagMatch("name", "configCount").sum(['cluster'])
  - name: config_read_count
    exp: nacos_monitor.tagMatch("name", "getConfig").sum(['cluster'])
  - name: config_write_count
    exp: nacos_monitor.tagMatch("name", "publish").sum(['cluster'])

  # core
  - name: total_connection_count
    exp: nacos_monitor.tagMatch("name", "longConnection").sum(['cluster','node'])
