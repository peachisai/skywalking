# This will parse a textual representation of a duration. The formats
# accepted are based on the ISO-8601 duration format {@code PnDTnHnMn.nS}
# with days considered to be exactly 24 hours.
# <p>
# Examples:
# <pre>
#    "PT20.345S" -- parses as "20.345 seconds"
#    "PT15M"     -- parses as "15 minutes" (where a minute is 60 seconds)
#    "PT10H"     -- parses as "10 hours" (where an hour is 3600 seconds)
#    "P2D"       -- parses as "2 days" (where a day is 24 hours or 86400 seconds)
#    "P2DT3H4M"  -- parses as "2 days, 3 hours and 4 minutes"
#    "P-6H3M"    -- parses as "-6 hours and +3 minutes"
#    "-P6H3M"    -- parses as "-6 hours and -3 minutes"
#    "-P-6H+3M"  -- parses as "+6 hours and -3 minutes"
# </pre>
filter: "{ tags -> tags.job_name == 'nacos-node' }" # The OpenTelemetry job name
expSuffix: tag({tags -> tags.cluster = 'nacos::' + tags.cluster}).instance(['cluster'], ['node'], Layer.NACOS)
metricPrefix: meter_nacos_node
metricsRules:

  # jvm metrics
  - name: cpu_usage
    exp: system_cpu_usage.sum(['cluster', 'node'])*100
  - name: memory_usage_percentage
    exp: (jvm_memory_used_bytes * 100).tagMatch("area", "heap").sum(['cluster', 'node', 'area']) / (jvm_memory_max_bytes).tagMatch("area", "heap").sum(['cluster', 'broker', 'area'])
  - name: gc_count
    exp: jvm_gc_pause_seconds_count.sum(['cluster', 'node']).increase('PT1M')
  - name: gc_time
    exp: (jvm_gc_pause_seconds_sum * 1000).sum(['cluster', 'node']).increase('PT1M')

  - name: thread_count
    exp: jvm_threads_daemon_threads.sum(['cluster', 'node'])
  - name: http_success_requests_count
    exp: http_server_requests_seconds_count.tagMatch("exception", "none").sum(['cluster', 'node','method'])
  - name: http_exception_requests_count
    exp: http_server_requests_seconds_count.tagNotMatch("exception", "none").sum(['cluster', 'node','method'])